# ============================================
# Frontend Production - Homelab (nurulizyansyaza)
# ============================================
# Frontend only (Nginx is in docker-compose.nginx.yml)
# Differences from staging:
#   - container names use "-production" suffix
#   - GHCR image tag is "production"
# ============================================

services:
  frontend:
    image: ghcr.io/nurulizyansyaza/ptt-frontend:production
    container_name: ptt-frontend-production
    restart: always
    networks:
      - ptt-network

networks:
  ptt-network:
    external: true

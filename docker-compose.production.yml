# ============================================
# Production Docker Compose
# ============================================
# Pulls images from ECR, connects to RDS
# Manual deployment trigger required
# ============================================

services:
  # Redis Cache (runs on EC2)
  redis:
    image: redis:7-alpine
    container_name: ptt-redis-production
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API (from ECR)
  api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ptt-api:production
    container_name: ptt-api-production
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      redis:
        condition: service_healthy

  # NextJS Frontend (from ECR)
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ptt-frontend:production
    container_name: ptt-frontend-production
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ptt-nginx-production
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  redis_data:

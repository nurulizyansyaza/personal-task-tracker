# ============================================
# Staging: Auto-Deploy on Push (Multi-Region)
# ============================================
# API → ap-southeast-1, Frontend → us-east-1

name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  API_REGION: ap-southeast-1
  FRONTEND_REGION: us-east-1
  ECR_API_REPO: ptt-api
  ECR_FRONTEND_REPO: ptt-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Docker Repo
        uses: actions/checkout@v4

      - name: Checkout API Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-api
          path: personal-task-tracker-api

      - name: Checkout Core Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-core
          path: personal-task-tracker-core

      - name: Checkout Frontend Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-frontend
          path: personal-task-tracker-frontend

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.API_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build core & prepare Docker contexts
        run: |
          cd personal-task-tracker-core
          npm ci
          npm run build

          # Copy built core into API and Frontend Docker contexts
          cp -r ../personal-task-tracker-core ../personal-task-tracker-api/personal-task-tracker-core
          cp -r ../personal-task-tracker-core ../personal-task-tracker-frontend/personal-task-tracker-core

          # Update file: references to point to local copy
          sed -i 's|file:../personal-task-tracker-core|file:./personal-task-tracker-core|' ../personal-task-tracker-api/package.json
          sed -i 's|file:../personal-task-tracker-core|file:./personal-task-tracker-core|' ../personal-task-tracker-frontend/package.json

      - name: Login to ECR (both regions)
        run: |
          aws ecr get-login-password --region ${{ env.API_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.API_REGION }}.amazonaws.com
          aws ecr get-login-password --region ${{ env.FRONTEND_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.FRONTEND_REGION }}.amazonaws.com

      - name: Build & Push API Image
        run: |
          cd personal-task-tracker-api
          docker build -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.API_REGION }}.amazonaws.com/${{ env.ECR_API_REPO }}:staging .
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.API_REGION }}.amazonaws.com/${{ env.ECR_API_REPO }}:staging

      - name: Build & Push Frontend Image
        run: |
          cd personal-task-tracker-frontend
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }} \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.FRONTEND_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:staging .
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.FRONTEND_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:staging

      - name: Deploy API to ap-southeast-1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_API_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/personal-task-tracker

            aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

            docker compose -f docker-compose.api-staging.yml pull
            docker compose -f docker-compose.api-staging.yml up -d --remove-orphans
            docker image prune -f

      - name: Deploy Frontend to us-east-1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_FRONTEND_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/personal-task-tracker

            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            docker compose -f docker-compose.frontend-staging.yml pull
            docker compose -f docker-compose.frontend-staging.yml up -d --remove-orphans
            docker image prune -f

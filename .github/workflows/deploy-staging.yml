# ============================================
# Staging: Auto-Deploy on Push (Homelab)
# ============================================
# Builds Docker images, pushes to GHCR, deploys to homelab via SSH

name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/nurulizyansyaza/ptt-api
  FRONTEND_IMAGE: ghcr.io/nurulizyansyaza/ptt-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Docker Repo
        uses: actions/checkout@v4

      - name: Checkout API Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-api
          path: personal-task-tracker-api

      - name: Checkout Core Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-core
          path: personal-task-tracker-core

      - name: Checkout Frontend Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-frontend
          path: personal-task-tracker-frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build core & prepare Docker contexts
        run: |
          cd personal-task-tracker-core
          npm ci
          npm run build

          # Copy built core into API and Frontend Docker contexts
          cp -r ../personal-task-tracker-core ../personal-task-tracker-api/personal-task-tracker-core
          cp -r ../personal-task-tracker-core ../personal-task-tracker-frontend/personal-task-tracker-core

          # Update file: references to point to local copy
          sed -i 's|file:../personal-task-tracker-core|file:./personal-task-tracker-core|' ../personal-task-tracker-api/package.json
          sed -i 's|file:../personal-task-tracker-core|file:./personal-task-tracker-core|' ../personal-task-tracker-frontend/package.json

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API Image
        run: |
          cd personal-task-tracker-api
          docker build -t ${{ env.API_IMAGE }}:staging .
          docker push ${{ env.API_IMAGE }}:staging

      - name: Build & Push Frontend Image
        run: |
          cd personal-task-tracker-frontend
          docker build \
            --build-arg "NEXT_PUBLIC_API_URL=/api" \
            -t ${{ env.FRONTEND_IMAGE }}:staging .
          docker push ${{ env.FRONTEND_IMAGE }}:staging

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          # Install cloudflared
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

          # Configure SSH to use cloudflared as proxy
          mkdir -p ~/.ssh
          echo '${{ secrets.STAGING_HOMELAB_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config << EOF
          Host homelab
            HostName ${{ secrets.STAGING_HOMELAB_HOST }}
            User ${{ secrets.HOMELAB_USERNAME }}
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Homelab
        run: |
          ssh homelab << 'DEPLOY'
          cd ~/personal-task-tracker

          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker network create ptt-network 2>/dev/null || true

          # Deploy API
          docker compose -p ptt-staging --env-file .env.api.staging -f docker-compose.api-staging.yml pull
          docker compose -p ptt-staging --env-file .env.api.staging -f docker-compose.api-staging.yml up -d

          # Deploy Frontend
          docker compose -p ptt-staging -f docker-compose.frontend-staging.yml pull
          docker compose -p ptt-staging -f docker-compose.frontend-staging.yml up -d

          # Reload host Nginx
          sudo nginx -s reload || true

          docker image prune -f || true
          echo "Staging deployment complete!"
          DEPLOY

# ============================================
# Staging: Auto-Deploy on Push
# ============================================
# Triggered when sub-repos push to staging branch
# Builds Docker images, pushes to ECR, deploys to EC2

name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_API_REPO: ptt-api
  ECR_FRONTEND_REPO: ptt-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Docker Repo
        uses: actions/checkout@v4

      - name: Checkout API Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-api
          token: ${{ secrets.DOCKER_REPO_PAT }}
          path: personal-task-tracker-api

      - name: Checkout Core Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-core
          token: ${{ secrets.DOCKER_REPO_PAT }}
          path: personal-task-tracker-core

      - name: Checkout Frontend Source
        uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/personal-task-tracker-frontend
          token: ${{ secrets.DOCKER_REPO_PAT }}
          path: personal-task-tracker-frontend

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push API Image
        run: |
          cd personal-task-tracker-api
          docker build -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_API_REPO }}:staging .
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_API_REPO }}:staging

      - name: Build & Push Frontend Image
        run: |
          cd personal-task-tracker-frontend
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }} \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:staging .
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:staging

      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/personal-task-tracker

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Pull latest images
            docker compose -f docker-compose.staging.yml pull

            # Restart services
            docker compose -f docker-compose.staging.yml up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

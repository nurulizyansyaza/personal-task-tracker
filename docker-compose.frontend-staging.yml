# ============================================
# Frontend Staging - Homelab (nurulizyansyaza)
# ============================================
# Frontend only (Nginx is in docker-compose.nginx.yml)
# Differences from production:
#   - container names use "-staging" suffix
#   - GHCR image tag is "staging"
# ============================================

services:
  frontend:
    image: ghcr.io/nurulizyansyaza/ptt-frontend:staging
    container_name: ptt-frontend-staging
    restart: always
    networks:
      - ptt-network

networks:
  ptt-network:
    external: true

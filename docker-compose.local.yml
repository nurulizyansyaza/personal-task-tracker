# ============================================
# Local Development Docker Compose
# ============================================
# Usage: docker compose -f docker-compose.local.yml up --build
# ============================================

services:
  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: ptt-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required - copy .env.local.example to .env}
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ptt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ../personal-task-tracker-api
      dockerfile: Dockerfile
    container_name: ptt-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # NextJS Frontend
  frontend:
    build:
      context: ../personal-task-tracker-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost/tasks
    container_name: ptt-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/tasks
    ports:
      - "3001:3001"
    depends_on:
      - api

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ptt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  mariadb_data:
  redis_data:

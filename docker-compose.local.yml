# ============================================
# Local Development Docker Compose
# ============================================
# Usage: docker compose -f docker-compose.local.yml up --build
# ============================================

services:
  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: ptt-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required - copy .env.local.example to .env}
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ptt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ../personal-task-tracker-api
      dockerfile: Dockerfile
    container_name: ptt-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3100:3000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # NextJS Frontend
  frontend:
    build:
      context: ../personal-task-tracker-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: ptt-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3101:3001"
    depends_on:
      - api

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ptt-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  # ============================================
  # Test Runners
  # ============================================
  # Usage:
  #   docker compose -f docker-compose.local.yml run --rm test          # all tests
  #   docker compose -f docker-compose.local.yml run --rm test-core     # core only
  #   docker compose -f docker-compose.local.yml run --rm test-api      # api only
  #   docker compose -f docker-compose.local.yml run --rm test-frontend # frontend only
  # ============================================

  test-core:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../personal-task-tracker-core:/app
      - /app/node_modules
    command: sh -c "npm install --silent && npm test"
    profiles: ["test"]

  test-api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../personal-task-tracker-api:/app
      - /app/node_modules
      - ../personal-task-tracker-core:/core
    command: sh -c "cp -r /core /tmp/personal-task-tracker-core && npm install --silent && rm -rf node_modules/personal-task-tracker-core && cp -r /tmp/personal-task-tracker-core node_modules/personal-task-tracker-core && npm test"
    profiles: ["test"]

  test-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../personal-task-tracker-frontend:/app
      - /app/node_modules
      - ../personal-task-tracker-core:/core
    command: sh -c "cp -r /core /tmp/personal-task-tracker-core && npm install --silent && npm install --silent ts-node && rm -rf node_modules/personal-task-tracker-core && cp -r /tmp/personal-task-tracker-core node_modules/personal-task-tracker-core && npm test"
    profiles: ["test"]

  test:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../personal-task-tracker-core:/workspace/personal-task-tracker-core
      - ../personal-task-tracker-api:/workspace/personal-task-tracker-api
      - ../personal-task-tracker-frontend:/workspace/personal-task-tracker-frontend
      - /workspace/personal-task-tracker-core/node_modules
      - /workspace/personal-task-tracker-api/node_modules
      - /workspace/personal-task-tracker-frontend/node_modules
    command: >
      sh -c "
        echo '--- Core Tests (41) ---' &&
        cd /workspace/personal-task-tracker-core && npm install --silent && npm test &&
        echo '' &&
        echo '--- API Tests (74) ---' &&
        cd /workspace/personal-task-tracker-api && npm install --silent && rm -rf node_modules/personal-task-tracker-core && cp -r /workspace/personal-task-tracker-core node_modules/personal-task-tracker-core && npm test &&
        echo '' &&
        echo '--- Frontend Tests (96) ---' &&
        cd /workspace/personal-task-tracker-frontend && npm install --silent && npm install --silent ts-node && rm -rf node_modules/personal-task-tracker-core && cp -r /workspace/personal-task-tracker-core node_modules/personal-task-tracker-core && npm test &&
        echo '' &&
        echo '=== All 211 tests passed ==='
      "
    profiles: ["test"]

volumes:
  mariadb_data:
  redis_data:
